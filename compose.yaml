include:
  - compose.infra.yml

services:
  # ----- Proofreading FastAPI (this repo) -----
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: piighost-proofreader-backend:latest
    environment:
      PIIGHOST_API_URL: http://piighost-api:8000
      LITELLM_MODEL: ${LITELLM_MODEL}
      LITELLM_API_KEY: ${LITELLM_API_KEY}
      LITELLM_API_BASE: ${LITELLM_API_BASE}
    depends_on:
      piighost-api:
        condition: service_healthy
    restart: unless-stopped

  # ----- React frontend (nginx serving dist + reverse-proxy /api) -----
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: piighost-proofreader-frontend:latest
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

  # ----- Legacy Streamlit UI (kept for debug, started via `--profile legacy`) -----
  streamlit:
    profiles: [legacy]
    build: .
    image: piighost-proofreader-streamlit:latest
    ports:
      - "8501:8501"
    environment:
      PIIGHOST_API_URL: http://piighost-api:8000
      LITELLM_MODEL: ${LITELLM_MODEL}
      LITELLM_API_KEY: ${LITELLM_API_KEY}
      LITELLM_API_BASE: ${LITELLM_API_BASE}
    depends_on:
      piighost-api:
        condition: service_healthy
    restart: unless-stopped
