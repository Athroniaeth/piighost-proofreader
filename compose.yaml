services:
  # ----- PII anonymisation API (sibling repo, public image) -----
  # NOTE: duplicated with compose.infra.yml. We don't `include:` because
  # Coolify's docker compose version (< 2.20) doesn't resolve includes,
  # so the project parses as "service depends on undefined service".
  # Keep this block in sync with compose.infra.yml if you edit either.
  piighost-api:
    # Built locally so pipeline.toml is baked into the image. See
    # Dockerfile.piighost-api. Avoids depending on a bind-mount that
    # Coolify's compose runner doesn't always honor.
    build:
      context: .
      dockerfile: Dockerfile.piighost-api
    image: piighost-proofreader-piighost-api:latest
    # No `ports:` here on purpose. In Coolify the other containers reach
    # this service via the docker network (piighost-api:8000), and the
    # host of the Coolify VM may already have something on port 8000.
    # For local dev that needs a host binding, use compose.infra.yml
    # which keeps `127.0.0.1:8000:8000`.
    environment:
      - REDIS_URL=redis://redis:6379
      - SECRET_PEPPER=${SECRET_PEPPER:-}
      - API_KEY_default=${PIIGHOST_API_KEY:-}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # ----- Proofreading FastAPI (this repo) -----
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: piighost-proofreader-backend:latest
    environment:
      PIIGHOST_API_URL: http://piighost-api:8000
      LITELLM_MODEL: ${LITELLM_MODEL}
      LITELLM_API_KEY: ${LITELLM_API_KEY}
      LITELLM_API_BASE: ${LITELLM_API_BASE}
    depends_on:
      piighost-api:
        condition: service_started
    restart: unless-stopped

  # ----- React frontend (nginx serving dist + reverse-proxy /api) -----
  # SERVICE_FQDN_FRONTEND is read by Coolify at deploy time: it provisions
  # a public Traefik FQDN routing to this container's exposed port.
  # Locally it's ignored, and the "5173:80" host mapping is used instead.
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: piighost-proofreader-frontend:latest
    environment:
      - SERVICE_FQDN_FRONTEND=/
    expose:
      - "80"
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

  # ----- Legacy Streamlit UI (kept for debug, started via `--profile legacy`) -----
  streamlit:
    profiles: [legacy]
    build: .
    image: piighost-proofreader-streamlit:latest
    ports:
      - "8501:8501"
    environment:
      PIIGHOST_API_URL: http://piighost-api:8000
      LITELLM_MODEL: ${LITELLM_MODEL}
      LITELLM_API_KEY: ${LITELLM_API_KEY}
      LITELLM_API_BASE: ${LITELLM_API_BASE}
    depends_on:
      piighost-api:
        condition: service_started
    restart: unless-stopped

volumes:
  redis-data:
