server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — every unknown path resolves to index.html so React
    # Router (or hash navigation) works.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy to the FastAPI backend. Streaming-friendly headers so
    # the SSE pipe doesn't buffer.
    location /api/ {
        proxy_pass http://backend:8001/api/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }
}
